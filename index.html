<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Verificação de Idade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #05040a;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .gate-container {
      background: #11111b;
      border-radius: 16px;
      padding: 24px 20px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    p {
      font-size: 0.95rem;
      margin-bottom: 16px;
      color: #d1d1d1;
    }

    .warning {
      font-size: 0.85rem;
      margin-bottom: 20px;
      color: #ff6b6b;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-18 {
      background: linear-gradient(135deg, #ff006f, #ff9800);
      color: #fff;
      margin-bottom: 10px;
    }

    .btn-18:not(:disabled):active {
      transform: scale(0.97);
    }

    .btn-sair {
      background: transparent;
      color: #999;
      font-size: 0.9rem;
    }

    .btn-sair:hover {
      text-decoration: underline;
    }

    .small-text {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="gate-container">
    <h1>Conteúdo para Maiores de 18</h1>
    <p>Para continuar, confirme que você é maior de idade.</p>
    <p class="warning">Se você tiver menos de 18 anos, saia desta página.</p>

    <div class="checkbox-row">
      <input type="checkbox" id="notRobot">
      <label for="notRobot">Não sou robô</label>
    </div>

    <button class="btn-18" id="enterBtn" disabled>
      Tenho +18 anos
    </button>

    <button class="btn-sair" onclick="window.location.href='https://google.com'">
      Não tenho 18 anos / Sair
    </button>

    <p class="small-text">Ao continuar, você declara que tem pelo menos 18 anos.</p>
  </div>

  <script>
    const notRobotCheckbox = document.getElementById('notRobot');
    const enterBtn = document.getElementById('enterBtn');

    // Habilita o botão somente se marcar "não sou robô"
    notRobotCheckbox.addEventListener('change', () => {
      enterBtn.disabled = !notRobotCheckbox.checked;
    });

    // Ao clicar em "Tenho +18 anos", redireciona para a página principal
    enterBtn.addEventListener('click', () => {
      // 👉 TROCAR A URL ABAIXO pela sua página real
      window.location.href = "https://ketlynlinks.site/";
    });
  </script>

</body>
</html>
