<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso 18+</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1a1a2e, #05040a);
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px 25px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ff006f, #ff9800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 0.95rem;
      color: #ccc;
      margin-bottom: 18px;
    }

    .check {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #ff006f;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #ff006f, #ff9800);
      color: #fff;
      transition: all 0.25s ease;
      box-shadow: 0 5px 20px rgba(255,0,111,0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255,0,111,0.6);
    }

    button:active {
      transform: scale(0.97);
    }

    .loader {
      margin-top: 15px;
      display: none;
      font-size: 0.85rem;
      color: #aaa;
    }

    .dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
      100% { content: '...'; }
    }

    .footer {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>ACESSO PARA MAIORES DE 18</h1>
    <p>Confirme que você tem idade legal para continuar.</p>

    <div class="check">
      <input type="checkbox" checked id="check">
      <label for="check">Não sou robô</label>
    </div>

    <button id="btn">Tenho +18 anos</button>

    <div class="loader" id="loader">
      Verificando<span class="dots"></span>
    </div>

    <div class="footer">
      Ao continuar você declara que tem pelo menos 18 anos
    </div>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');

    btn.addEventListener('click', () => {
      btn.style.display = 'none';
      loader.style.display = 'block';

      setTimeout(() => {
        window.location.href = "https://ketlynlinks.site/";
      }, 1500);
    });
  </script>

</body>
</html>
