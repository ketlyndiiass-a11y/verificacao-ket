<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  color: #fff;
}

.bottom {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 380px;
  text-align: center;
  opacity: 0;
  transform: translateY(40px);
}

.show {
  animation: showCard 0.6s ease forwards;
}

@keyframes showCard {
  to { opacity: 1; transform: translateY(0); }
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 999px;
  font-size: 1rem;
  font-weight: bold;
  background: linear-gradient(135deg, #ff006f, #ff9800);
  color: #fff;
  box-shadow: 0 8px 25px rgba(255,0,111,0.5);
  transition: 0.15s;
}

button:active { transform: scale(0.98); }

</style>

<body>

<div class="bottom">
  <div class="card" id="card">
    <button id="btn">Continuar</button>
  </div>
</div>

<script>
const card = document.getElementById('card');
const btn = document.getElementById('btn');
const desktopBlock = document.getElementById('desktopBlock');

/* ANIMAÇÃO COM DELAY */
setTimeout(() => { card.classList.add('show'); }, 150);

/* REDIRECIONAMENTO */
btn.addEventListener('click', () => {
  btn.innerText = "Acessando...";
  btn.style.opacity = "0.9";
  btn.style.pointerEvents = "none";
  setTimeout(() => { window.location.href = "https://t.me/josiianeAndrbot"; }, 150);
});
</script>
