<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso</title>

<!-- acelera carregamento do destino -->
<link rel="preconnect" href="https://t.me">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #000;
  color: #fff;
}

/* BLOQUEIO DESKTOP */
.desktop-block {
  position: fixed;
  inset: 0;
  background: #000;
  color: #fff;
  display: none;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  z-index: 9999;
}

/* IMAGEM TOPO */
.top {
  height: 58vh;
  background: url('Perfil.jpeg') center/cover no-repeat;
  position: relative;
}

.top::after {
  content: '';
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to bottom, transparent, #000);
}

/* PARTE INFERIOR */
.bottom {
  height: 42vh;
  background: #000;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 10px 20px 20px;
}

/* CARD */
.card {
  width: 100%;
  max-width: 380px;
  text-align: center;

  opacity: 0;
  transform: translateY(40px);
}

.show {
  animation: showCard 0.8s ease forwards;
}

@keyframes showCard {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 1.35rem;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #ff006f, #ff9800);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  font-size: 0.85rem;
  color: #ccc;
  margin-bottom: 14px;
}

.check {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
  font-size: 0.85rem;
}

input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #ff006f;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 999px;
  font-size: 1rem;
  font-weight: bold;
  background: linear-gradient(135deg, #ff006f, #ff9800);
  color: #fff;
  box-shadow: 0 8px 25px rgba(255,0,111,0.5);
  transition: 0.2s;
}

button:active {
  transform: scale(0.96);
}

.footer {
  margin-top: 8px;
  font-size: 0.7rem;
  color: #777;
}
</style>
</head>

<body>

<!-- BLOQUEIO DESKTOP -->
<div class="desktop-block" id="desktopBlock">
  <div>
    <h2>Acesse pelo celular</h2>
    <p>Este conteúdo está disponível apenas em dispositivos móveis.</p>
  </div>
</div>

<div class="top"></div>

<div class="bottom">
  <div class="card" id="card">

    <h1>ACESSO TOTAL</h1>
    <p>Confirme que você tem idade legal para continuar.</p>

    <div class="check">
      <input type="checkbox" checked>
      <span>Não sou robô</span>
    </div>

    <button id="btn">Continuar</button>

    <div class="footer">
      Ao continuar você declara que tem pelo menos 18 anos
    </div>

  </div>
</div>

<script>
const card = document.getElementById('card');
const btn = document.getElementById('btn');
const desktopBlock = document.getElementById('desktopBlock');

/* DETECTA MOBILE */
function isMobile() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

if (!isMobile()) {
  desktopBlock.style.display = 'flex';
}

/* ANIMAÇÃO COM DELAY */
setTimeout(() => {
  card.classList.add('show');
}, 300);

/* REDIRECIONAMENTO INTELIGENTE */
btn.addEventListener('click', () => {

  btn.innerText = "Acessando...";
  btn.style.opacity = "0.7";
  btn.style.pointerEvents = "none";

  setTimeout(() => {
    window.location.href = "https://t.me/josiianeandrade_bot";
  }, 100);

});
</script>

</body>
</html>
