<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso 18+</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: flex-end; /* JOGA CARD PRA BAIXO */
      justify-content: center;
      background: url('17.jpg') center/cover no-repeat;
      position: relative;
      color: #fff;
    }

    /* OVERLAY */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
    }

    /* CARD */
    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      margin-bottom: 30px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px 20px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);

      /* INICIA ESCONDIDO */
      opacity: 0;
      transform: translateY(40px);
    }

    /* ANIMAÇÃO */
    .show {
      animation: showCard 0.8s ease forwards;
    }

    @keyframes showCard {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ff006f, #ff9800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 0.9rem;
      color: #ddd;
      margin-bottom: 18px;
    }

    .check {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #ff006f;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #ff006f, #ff9800);
      color: #fff;
      box-shadow: 0 8px 30px rgba(255,0,111,0.5);
      transition: 0.25s;
    }

    button:active {
      transform: scale(0.96);
    }

    .loader {
      margin-top: 12px;
      display: none;
      font-size: 0.85rem;
      color: #ccc;
    }

    .footer {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #bbb;
    }

    /* MOBILE AJUSTE */
    @media (max-width: 480px) {
      .card {
        border-radius: 20px 20px 0 0;
        margin-bottom: 0;
      }
    }

  </style>
</head>
<body>

  <div class="card" id="card">

    <h1>ACESSO PARA MAIORES DE 18</h1>
    <p>Confirme que você tem idade legal para continuar.</p>

    <div class="check">
      <input type="checkbox" checked id="check">
      <label for="check">Não sou robô</label>
    </div>

    <button id="btn">Tenho +18 anos</button>

    <div class="loader" id="loader">
      Verificando...
    </div>

    <div class="footer">
      Ao continuar você declara que tem pelo menos 18 anos
    </div>

  </div>

  <script>
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');
    const card = document.getElementById('card');

    // ⏱️ Delay de 2 segundos
    setTimeout(() => {
      card.classList.add('show');
    }, 2000);

    btn.addEventListener('click', () => {
      btn.style.display = 'none';
      loader.style.display = 'block';

      setTimeout(() => {
        window.location.href = "https://t.me/KettFreris_bot";
      }, 1500);
    });
  </script>

</body>
</html>
